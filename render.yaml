services:
  - type: web
    name: fontscan
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter          # upgrade to 'standard' if you need more RAM for Chrome
    healthCheckPath: /healthz

    envVars:
      - key: OPENAI_API_KEY
        sync: false        # you'll enter this value in the Render dashboard
      - key: DATABASE_URL
        value: sqlite:////data/fontscan_users.db
      - key: AI_CACHE_FILE
        value: /data/font_ai_cache.json

    # Persistent disk so SQLite survives redeploys
    disk:
      name: fontscan-data
      mountPath: /data
      sizeGB: 1
