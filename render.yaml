services:
  - type: web
    name: fontscan
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /usr/local/lib/playwright-browsers
    disk:
      name: fontscan-data
      mountPath: /app
      sizeGB: 1